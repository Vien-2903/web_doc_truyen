<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Trang</title>
    <link rel="stylesheet" href="/web_doc_truyen/frontend/public/css/theloaiandtrang.css">
</head>
<body>

<a href="/web_doc_truyen/frontend/view/trang" class="btn-home">← Quay lại</a>

<h1 class="form-title">Thêm Trang Mới</h1>

<div id="api-message"></div>

<div class="user-form">
    <form id="formTrang" enctype="multipart/form-data">
        <table>
            <tr>
                <td>Chương: <span class="required">*</span></td>
                <td>
                    <select name="id_chuong" id="id_chuong" required>
                        <option value="">-- Chọn chương --</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Trang số: <span class="required">*</span></td>
                <td>
                    <input type="number" name="so_trang" min="1" placeholder="VD: 1" required>
                </td>
            </tr>
            <tr>
                <td>Loại: <span class="required">*</span></td>
                <td>
                   Ảnh
                    
                </td>
            </tr>
            <tr>
                
            </tr>
            <tr>
                <td>Ảnh:</td>
                <td>
                    <input type="file" name="anh" accept="image/*">
                </td>
            </tr>
        </table>

        <div class="form-actions">
            <button type="submit">Thêm trang</button>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const form         = document.getElementById('formTrang');
    const msgBox       = document.getElementById('api-message');
    const selectChuong = document.getElementById('id_chuong');

    const urlParams        = new URLSearchParams(window.location.search);
    const idChuongFromUrl  = urlParams.get('id_chuong');

    async function loadChuong() {
        try {
            const res  = await fetch('../../../backend/api/trang/get_trang_api.php?all_chuong=1');
            const data = await res.json();
            if (data.success && Array.isArray(data.data)) {
    data.data.forEach(function (c) {
        const opt = document.createElement('option');
        opt.value       = c.id;
        opt.textContent = 'Chương ' + c.so_chuong + ' - ' + (c.tieu_de || '');
        if (idChuongFromUrl && String(c.id) === String(idChuongFromUrl)) {
            opt.selected = true;
        }
        selectChuong.appendChild(opt);
    });
}
        } catch (err) {
            console.error('Lỗi tải chương:', err);
        }
    }

    loadChuong();

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        msgBox.textContent = '';
        const btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        try {
            const res  = await fetch('../../../backend/api/trang/add_trang_api.php', {
                method: 'POST',
                body: new FormData(form)
            });
            const data = await res.json();
            if (res.ok && data.success) {
                msgBox.style.color = 'var(--success)';
                msgBox.textContent = data.message || 'Thêm trang thành công';
               if (res.ok && data.success) {
    msgBox.style.color = 'var(--success)';
    msgBox.textContent = data.message || 'Thêm trang thành công';

    // Reset form để nhập tiếp
    form.reset();

    // Reset select về mặc định
    selectChuong.value = '';

}
            } else {
                msgBox.style.color = 'var(--danger)';
                msgBox.textContent = data.message || 'Thêm thất bại';
            }
        } catch (err) {
            msgBox.style.color = 'var(--danger)';
            msgBox.textContent = 'Lỗi: ' + err.message;
        } finally {
            btn.disabled = false;
        }
    });
});
</script>

</body>
</html>
