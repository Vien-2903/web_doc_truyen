<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truyện Theo Dõi</title>
    <link rel="stylesheet" href="/web_doc_truyen/frontend/public/css/theo_doi_truyen.css?v=20260408-5">
</head>
<body>
    <div class="page-wrapper">
        <a href="/web_doc_truyen/frontend/public/index.html" class="back-button">&larr; Quay lại</a>

        <header class="page-header">
            <h1>Danh sách truyện theo dõi</h1>
            <p class="page-subtitle">Nơi lưu lại những truyện bạn đã theo dõi.</p>
        </header>

        <div id="apiMessage" class="api-message">Đang tải danh sách theo dõi...</div>

        <section id="favoritesContainer" class="favorites-container"></section>
    </div>

    <script>
        const apiMessage = document.getElementById('apiMessage');
        const favoritesContainer = document.getElementById('favoritesContainer');

        function ensureToastContainer() {
            let container = document.getElementById('toastContainer');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toastContainer';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            return container;
        }

        function showToast(message, type = 'success') {
            const container = ensureToastContainer();
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 260);
            }, 2200);
        }

        async function getCurrentUser() {
            try {
                const storedUser = JSON.parse(localStorage.getItem('user') || 'null');
                if (storedUser && storedUser.id) return storedUser;
            } catch (error) {}

            try {
                const response = await fetch('/web_doc_truyen/backend/api/profile/profile_api.php', {
                    method: 'GET',
                    credentials: 'same-origin'
                });

                if (!response.ok) return null;

                const data = await response.json();
                if (data && data.success && data.data && data.data.id) {
                    const user = {
                        id: data.data.id,
                        username: data.data.ten_dang_nhap || '',
                        email: data.data.email || '',
                        role: data.data.vai_tro || 'user'
                    };
                    localStorage.setItem('user', JSON.stringify(user));
                    return user;
                }
            } catch (error) {
                console.warn('Không thể lấy thông tin user từ server:', error);
            }

            return null;
        }

        function resolveCoverUrl(anhBia) {
            if (!anhBia) {
                return 'https://via.placeholder.com/180x240/667eea/ffffff?text=No+Image';
            }

            let normalized = String(anhBia).trim().replace(/\\/g, '/');

            if (normalized.startsWith('http://') || normalized.startsWith('https://') || normalized.startsWith('/')) {
                if (!normalized.startsWith('/web_doc_truyen/')) return normalized;
                normalized = normalized.replace(/^\/web_doc_truyen\//, '');
            }

            if (normalized.startsWith('web_doc_truyen/')) {
                normalized = normalized.replace(/^web_doc_truyen\//, '');
            }

            const legacyPrefixes = [
                'uploads/anhbia/',
                'frontend/public/uploads/anhbia/',
                'frontend/images/anhbia/',
                'images/anhbia/',
                'backend/uploads/anhbia/'
            ];

            for (const prefix of legacyPrefixes) {
                if (normalized.startsWith(prefix)) {
                    const parts = normalized.split('/').filter(Boolean);
                    const fileName = parts[parts.length - 1] || '';
                    if (fileName) return '/web_doc_truyen/backend/uploads/anhbia/' + fileName;
                }
            }

            if (normalized.startsWith('backend/') || normalized.startsWith('frontend/')) {
                return '/web_doc_truyen/' + normalized;
            }

            return '/web_doc_truyen/' + normalized;
        }

        function renderEmptyState() {
            favoritesContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">&#10084;</div>
                    <h2>Bạn chưa theo dõi truyện nào</h2>
                    <p>Hãy đăng nhập và theo dõi những truyện bạn muốn lưu lại.</p>
                    <a class="primary-button" href="/web_doc_truyen/frontend/view/log/login.html">Đăng nhập</a>
                </div>
            `;
        }

        function renderNoFollowing() {
            favoritesContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">&#128214;</div>
                    <h2>Danh sách theo dõi trống</h2>
                    <p>Bạn chưa theo dõi truyện nào. Khám phá và thêm truyện vào danh sách theo dõi của mình.</p>
                    <a class="primary-button" href="/web_doc_truyen/frontend/public/index.html">Khám phá truyện</a>
                </div>
            `;
        }

        function renderFollowing(items) {
            favoritesContainer.innerHTML = items.map(item => {
                const author = item.but_danh || item.ten_tacgia || 'Chưa rõ';
                const imageUrl = resolveCoverUrl(item.anh_bia);
                return `
                    <article class="favorite-card" data-id="${item.id}">
                        <a class="favorite-link" href="/web_doc_truyen/frontend/public/index.php?page=chitiet&id=${item.id}">
                            <div class="favorite-cover">
                                <img src="${imageUrl}" alt="${item.ten_truyen}" onerror="this.src='https://via.placeholder.com/180x240/667eea/ffffff?text=No+Image'">
                            </div>
                            <div class="favorite-details">
                                <h2>${item.ten_truyen}</h2>
                                <p class="favorite-author">Tác giả: ${author}</p>
                                <p class="favorite-meta">Lượt xem: ${Number(item.luot_xem || 0).toLocaleString()}</p>
                            </div>
                        </a>
                        <button class="btn-remove-favorite" data-id="${item.id}">Bỏ theo dõi</button>
                    </article>
                `;
            }).join('');

            document.querySelectorAll('.btn-remove-favorite').forEach(button => {
                button.addEventListener('click', async function () {
                    const user = await getCurrentUser();
                    if (!user || !user.id) {
                        window.location.href = '/web_doc_truyen/frontend/view/log/login.html';
                        return;
                    }

                    const truyenId = button.dataset.id;
                    const card = button.closest('.favorite-card');
                    const confirmRemove = window.confirm('Bạn có đồng ý bỏ theo dõi truyện này không?');
                    if (!confirmRemove) return;

                    button.disabled = true;
                    button.textContent = 'Đang xóa...';

                    try {
                        const response = await fetch('/web_doc_truyen/backend/api/theo_doi_truyen/remove_theodoi_api.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ id_nguoidung: user.id, id_truyen: truyenId })
                        });
                        const data = await response.json();

                        if (response.ok && data.success) {
                            card.remove();
                            const visibleCards = document.querySelectorAll('.favorite-card');
                            if (visibleCards.length === 0) renderNoFollowing();

                            apiMessage.textContent = 'Đã bỏ theo dõi thành công.';
                            apiMessage.className = 'api-message success';
                            showToast('Đã bỏ theo dõi truyện.', 'success');
                            localStorage.setItem('followListUpdatedAt', String(Date.now()));
                        } else {
                            apiMessage.textContent = data.message || 'Bỏ theo dõi thất bại.';
                            apiMessage.className = 'api-message error';
                            showToast(apiMessage.textContent, 'error');
                        }
                    } catch (error) {
                        apiMessage.textContent = 'Lỗi kết nối. Vui lòng thử lại.';
                        apiMessage.className = 'api-message error';
                        showToast(apiMessage.textContent, 'error');
                    } finally {
                        button.disabled = false;
                        button.textContent = 'Bỏ theo dõi';
                    }
                });
            });
        }

        async function loadFollowing() {
            const user = await getCurrentUser();
            if (!user || !user.id) {
                apiMessage.textContent = 'Bạn cần đăng nhập để xem danh sách theo dõi.';
                apiMessage.className = 'api-message warning';
                renderEmptyState();
                return;
            }

            try {
                const response = await fetch('/web_doc_truyen/backend/api/theo_doi_truyen/get_by_user_theodoi_api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_nguoidung: user.id })
                });

                const data = await response.json();
                if (response.ok && data.success && Array.isArray(data.data)) {
                    if (data.data.length === 0) {
                        apiMessage.textContent = 'Chưa có truyện theo dõi.';
                        apiMessage.className = 'api-message info';
                        renderNoFollowing();
                    } else {
                        apiMessage.textContent = 'Danh sách theo dõi đã sẵn sàng.';
                        apiMessage.className = 'api-message success';
                        renderFollowing(data.data);
                    }
                } else {
                    apiMessage.textContent = data.message || 'Không tải được danh sách theo dõi.';
                    apiMessage.className = 'api-message error';
                    renderNoFollowing();
                }
            } catch (error) {
                apiMessage.textContent = 'Lỗi kết nối tới API. Vui lòng thử lại.';
                apiMessage.className = 'api-message error';
                renderNoFollowing();
            }
        }

        window.addEventListener('followingUpdated', function() {
            loadFollowing();
        });

        window.addEventListener('storage', function(event) {
            if (event.key === 'followListUpdatedAt') loadFollowing();
        });

        loadFollowing();
    </script>
</body>
</html>
