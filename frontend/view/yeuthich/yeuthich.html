<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truyện Yêu Thích</title>
    <link rel="stylesheet" href="/web_doc_truyen/frontend/public/css/yeuthich.css">
</head>
<body>
    <div class="page-wrapper">
        <a href="/web_doc_truyen/frontend/public/index.html" class="back-button">← Quay lại</a>

        <header class="page-header">
            <h1>❤️ Danh sách truyện yêu thích</h1>
            <p class="page-subtitle">Nơi lưu lại những truyện bạn đã đánh dấu yêu thích.</p>
        </header>

        <div id="apiMessage" class="api-message">Đang tải danh sách yêu thích...</div>

        <section id="favoritesContainer" class="favorites-container"></section>
    </div>

    <script>
        const apiMessage = document.getElementById('apiMessage');
        const favoritesContainer = document.getElementById('favoritesContainer');

        async function getCurrentUser() {
            try {
                const storedUser = JSON.parse(localStorage.getItem('user') || 'null');
                if (storedUser && storedUser.id) {
                    return storedUser;
                }
            } catch (error) {
                // ignore
            }

            try {
                const response = await fetch('/web_doc_truyen/backend/api/profile/profile_api.php', {
                    method: 'GET',
                    credentials: 'same-origin'
                });

                if (!response.ok) {
                    return null;
                }

                const data = await response.json();
                if (data && data.success && data.data && data.data.id) {
                    const user = {
                        id: data.data.id,
                        username: data.data.ten_dang_nhap || '',
                        email: data.data.email || '',
                        role: data.data.vai_tro || 'user'
                    };
                    localStorage.setItem('user', JSON.stringify(user));
                    return user;
                }
            } catch (error) {
                console.warn('Không thể lấy thông tin user từ server:', error);
            }

            return null;
        }

        function resolveCoverUrl(anhBia) {
            if (!anhBia) {
                return 'https://via.placeholder.com/180x240/667eea/ffffff?text=No+Image';
            }

            let normalized = String(anhBia).trim().replace(/\\/g, '/');

            if (normalized.startsWith('http://') || normalized.startsWith('https://') || normalized.startsWith('/')) {
                if (!normalized.startsWith('/web_doc_truyen/')) {
                    return normalized;
                }
                normalized = normalized.replace(/^\/web_doc_truyen\//, '');
            }

            if (normalized.startsWith('web_doc_truyen/')) {
                normalized = normalized.replace(/^web_doc_truyen\//, '');
            }

            const legacyPrefixes = [
                'uploads/anhbia/',
                'frontend/public/uploads/anhbia/',
                'frontend/images/anhbia/',
                'images/anhbia/',
                'backend/uploads/anhbia/'
            ];

            for (const prefix of legacyPrefixes) {
                if (normalized.startsWith(prefix)) {
                    const parts = normalized.split('/').filter(Boolean);
                    const fileName = parts[parts.length - 1] || '';
                    if (fileName) {
                        return '/web_doc_truyen/backend/uploads/anhbia/' + fileName;
                    }
                }
            }

            if (normalized.startsWith('backend/') || normalized.startsWith('frontend/')) {
                return '/web_doc_truyen/' + normalized;
            }

            return '/web_doc_truyen/' + normalized;
        }

        function renderEmptyState() {
            favoritesContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">💔</div>
                    <h2>Bạn chưa có truyện yêu thích nào</h2>
                    <p>Hãy đăng nhập và đánh dấu yêu thích những truyện bạn muốn lưu lại.</p>
                    <a class="primary-button" href="/web_doc_truyen/frontend/view/log/login.html">Đăng nhập</a>
                </div>
            `;
        }

        function renderNoFavorites() {
            favoritesContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📖</div>
                    <h2>Danh sách yêu thích trống</h2>
                    <p>Bạn chưa thích truyện nào. Khám phá và thêm truyện vào danh sách yêu thích của mình.</p>
                    <a class="primary-button" href="/web_doc_truyen/frontend/public/index.html">Khám phá truyện</a>
                </div>
            `;
        }

        function renderFavorites(items) {
            favoritesContainer.innerHTML = items.map(item => {
                const author = item.but_danh || item.ten_tacgia || 'Chưa rõ';
                const imageUrl = resolveCoverUrl(item.anh_bia);
                return `
                    <article class="favorite-card" data-id="${item.id}">
                        <a class="favorite-link" href="/web_doc_truyen/frontend/public/index.php?page=chitiet&id=${item.id}">
                            <div class="favorite-cover">
                                <img src="${imageUrl}" alt="${item.ten_truyen}" onerror="this.src='https://via.placeholder.com/180x240/667eea/ffffff?text=No+Image'">
                            </div>
                            <div class="favorite-details">
                                <h2>${item.ten_truyen}</h2>
                                <p class="favorite-author">Tác giả: ${author}</p>
                                <p class="favorite-meta">👁️ ${Number(item.luot_xem || 0).toLocaleString()} lượt xem</p>
                            </div>
                        </a>
                        <button class="btn-remove-favorite" data-id="${item.id}">💔 Bỏ yêu thích</button>
                    </article>
                `;
            }).join('');

            document.querySelectorAll('.btn-remove-favorite').forEach(button => {
                button.addEventListener('click', async function () {
                    const user = await getCurrentUser();
                    if (!user || !user.id) {
                        window.location.href = '/web_doc_truyen/frontend/view/log/login.html';
                        return;
                    }
                    const truyenId = button.dataset.id;
                    const card = button.closest('.favorite-card');
                    const confirmRemove = window.confirm('Bạn có chắc muốn bỏ yêu thích truyện này?');
                    if (!confirmRemove) return;

                    button.disabled = true;
                    button.textContent = 'Đang xóa...';

                    try {
                        const response = await fetch('/web_doc_truyen/backend/api/yeuthich/remove.php', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                id_nguoidung: user.id,
                                id_truyen: truyenId
                            })
                        });
                        const data = await response.json();

                        if (response.ok && data.success) {
                            card.remove();
                            const visibleCards = document.querySelectorAll('.favorite-card');
                            if (visibleCards.length === 0) {
                                renderNoFavorites();
                            }
                            apiMessage.textContent = 'Đã bỏ yêu thích thành công.';
                            apiMessage.className = 'api-message success';
                        } else {
                            apiMessage.textContent = data.message || 'Xóa yêu thích thất bại.';
                            apiMessage.className = 'api-message error';
                        }
                    } catch (error) {
                        apiMessage.textContent = 'Lỗi kết nối. Vui lòng thử lại.';
                        apiMessage.className = 'api-message error';
                    } finally {
                        button.disabled = false;
                        button.textContent = '💔 Bỏ yêu thích';
                    }
                });
            });
        }

        async function loadFavorites() {
            const user = await getCurrentUser();
            if (!user || !user.id) {
                apiMessage.textContent = 'Bạn cần đăng nhập để xem danh sách yêu thích.';
                apiMessage.className = 'api-message warning';
                renderEmptyState();
                return;
            }

            try {
                const response = await fetch('/web_doc_truyen/backend/api/yeuthich/get_by_user.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ id_nguoidung: user.id })
                });

                const data = await response.json();
                if (response.ok && data.success && Array.isArray(data.data)) {
                    if (data.data.length === 0) {
                        apiMessage.textContent = 'Chưa có truyện yêu thích.';
                        apiMessage.className = 'api-message info';
                        renderNoFavorites();
                    } else {
                        apiMessage.textContent = 'Danh sách yêu thích đã sẵn sàng.';
                        apiMessage.className = 'api-message success';
                        renderFavorites(data.data);
                    }
                } else {
                    apiMessage.textContent = data.message || 'Không tải được yêu thích.';
                    apiMessage.className = 'api-message error';
                    renderNoFavorites();
                }
            } catch (error) {
                apiMessage.textContent = 'Lỗi kết nối tới API. Vui lòng thử lại.';
                apiMessage.className = 'api-message error';
                renderNoFavorites();
            }
        }

        // Lắng nghe sự kiện cập nhật từ trang chủ
        window.addEventListener('favoritesUpdated', function(event) {
            console.log('Sự kiện favoritesUpdated nhận được:', event.detail);
            loadFavorites();
        });

        // Lắng nghe thay đổi localStorage để đồng bộ giữa các tab
        window.addEventListener('storage', function(event) {
            if (event.key === 'favoriteListUpdatedAt') {
                console.log('Storage event favoritesUpdated nhận được:', event.newValue);
                loadFavorites();
            }
        });

        loadFavorites();
    </script>
</body>
</html>
