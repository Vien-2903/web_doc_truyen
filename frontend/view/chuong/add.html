<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Chương</title>
    <link rel="stylesheet" href="/web_doc_chuyen/frontend/public/css/chuong.css">
   
</head>
<body>
    <a href="index.php?page=admin&controller=chuong&action=index" class="btn-home">← Quay lại</a>
    
    <h1 class="form-title"> Thêm Chương Mới</h1>

    <div id="api-message" style="max-width:800px;margin:12px auto;text-align:center"></div>

    <div class="user-form">
        <form method="POST">
            <table>
                <tr>
                    <td>Truyện: <span class="required">*</span></td>
                    <td>
                        <select name="id_truyen" id="select-truyen" required>
                            <option value="">-- Đang tải truyện... --</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Chương số: <span class="required">*</span></td>
                    <td>
                        <input type="number" 
                               name="so_chuong" 
                               placeholder="VD: 1" 
                               min="1"
                               required>
                    </td>
                </tr>
                <tr>
                    <td>Tiêu đề: <span class="required">*</span></td>
                    <td>
                        <input type="text" 
                               name="tieu_de" 
                               placeholder="VD: Khởi đầu" 
                               required>
                    </td>
                </tr>
                
            </table>
            
            <div class="form-actions">
                <button type="submit"> Thêm chương</button>
                <a href="index.php?page=admin&controller=chuong&action=index" class="btn-back"> Hủy</a>
            </div>
        </form>
    </div>
    <script>
    document.addEventListener('DOMContentLoaded', function(){
        const msgBox = document.getElementById('api-message');
        const selectTruyen = document.getElementById('select-truyen');
        // load truyens for dropdown
        async function loadTruyens(){
            try{
                const res = await fetch('../../../backend/api/truyen/truyen_api.php');
                const json = await res.json();
                const list = (json && (json.data || json.stories)) ? (json.data || json.stories) : [];
                selectTruyen.innerHTML = '<option value="">-- Chọn truyện --</option>';
                list.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.id;
                    opt.textContent = t.ten_truyen || t.tenTruyen || ('Truyện ' + t.id);
                    selectTruyen.appendChild(opt);
                });
            } catch(err){
                console.error('Lỗi tải danh sách truyện', err);
                selectTruyen.innerHTML = '<option value="">Không tải được truyện</option>';
                if(msgBox){ msgBox.style.color='red'; msgBox.textContent = 'Không tải được danh sách truyện.'; }
            }
        }
        loadTruyens();

        // handle form submit via API
        const form = document.querySelector('form');
        form.addEventListener('submit', async function(e){
            e.preventDefault();
            msgBox.textContent = '';
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            const fd = new FormData(form);
            try{
                const res = await fetch('../../../backend/api/chuong/add_chuong_api.php', { method: 'POST', body: fd });
                const json = await res.json();
                if(res.ok && json.success){
                    msgBox.style.color = 'green';
                    msgBox.textContent = json.message || 'Thêm chương thành công';
                    setTimeout(()=>{ window.location.href = 'index.php?page=admin&controller=chuong&action=index&success=add'; }, 800);
                } else {
                    msgBox.style.color = 'red';
                    msgBox.textContent = (json && json.message) ? json.message : 'Lỗi khi thêm chương';
                    if(json && json.errors) msgBox.textContent += ': ' + json.errors.join('; ');
                }
            } catch(err){
                msgBox.style.color = 'red';
                msgBox.textContent = 'Lỗi kết nối: ' + err.message;
            } finally{
                submitBtn.disabled = false;
            }
        });
    });
    </script>
</body>
</html>
